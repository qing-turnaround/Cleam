name: Cleam
options:
  bundleIdPrefix: com.cleam
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38.0"

targets:
  Cleam:
    type: application
    platform: macOS
    sources:
      - path: Cleam
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cleam.app
        PRODUCT_NAME: Cleam
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_ENTITLEMENTS: Cleam/Resources/Cleam.entitlements
        INFOPLIST_FILE: Cleam/Resources/Info.plist
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_IDENTITY: "-"
    entitlements:
      path: Cleam/Resources/Cleam.entitlements

  CleamTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CleamTests
    dependencies:
      - target: Cleam
    settings:
      base:
        SWIFT_VERSION: "5.9"
